<div class="container">

	<div style="grid-column: 1 / span 2; margin-left: auto; margin-right: auto;">JFxPos - Server</div>

	<div class="loginbox">
		<h1>Sign In</h1>
		<div>
			<input type="text" id="obj_username" placeholder="username" autocomplete="off">
		</div>
		<div class="password-container">
			<input type="password" id="obj_password" placeholder="password" autocomplete="off">
			<span id="btn_show_password" class="toggle-password">👁️</span>
		</div>
		<div>
			<button id="btn_login">Login</button>
		</div>
	</div>
	
</div>
